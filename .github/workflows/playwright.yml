name: Playwright Preview Tests

on:
  pull_request:
    branches: [e-commerce]

permissions:
  checks: read
  contents: read
  issues: read
  pull-requests: read

jobs:
  test-preview:
    name: Playwright on Cloudflare preview
    timeout-minutes: 30
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Wait for Cloudflare Pages preview
        id: preview
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          ISSUE_NUMBER: ${{ github.event.pull_request.number }}
          REPOSITORY: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail

          deadline=$((SECONDS + 20 * 60))
          short_sha="${HEAD_SHA:0:7}"

          read_deployment() {
            python - "$@" <<'PY'
          import json
          import re
          import sys

          source = sys.argv[1]
          path = sys.argv[2]
          data = json.load(open(path))
          preview_url_pattern = re.compile(
              r"<strong>Preview URL:</strong>[\s\S]*?<a href='([^']+)'",
          )

          bodies = []
          if source == "checks":
              for check in data.get("check_runs", []):
                  app = check.get("app") or {}
                  if app.get("slug") != "cloudflare-workers-and-pages":
                      continue
                  if check.get("name") != "Cloudflare Pages":
                      continue
                  if check.get("conclusion") == "failure":
                      print("failure")
                      sys.exit(0)
                  if check.get("status") == "completed":
                      output = check.get("output") or {}
                      bodies.append(output.get("summary") or "")
          else:
              short_sha = sys.argv[3]
              for comment in reversed(data):
                  user = comment.get("user") or {}
                  body = comment.get("body") or ""
                  if user.get("login") != "cloudflare-workers-and-pages[bot]":
                      continue
                  if f"<code>{short_sha}</code>" in body:
                      bodies.append(body)
                      break

          for body in bodies:
              if "Deploy failed" in body:
                  print("failure")
                  sys.exit(0)
              if "Deploy successful" not in body:
                  continue
              match = preview_url_pattern.search(body)
              if not match:
                  print("missing-url")
                  sys.exit(0)
              print(f"success {match.group(1)}")
              sys.exit(0)

          print("pending")
          PY
          }

          while (( SECONDS < deadline )); do
            check_runs_json="$(mktemp)"
            comments_json="$(mktemp)"

            gh api "repos/${REPOSITORY}/commits/${HEAD_SHA}/check-runs" \
              -F check_name='Cloudflare Pages' \
              -F per_page=100 > "$check_runs_json"

            check_result="$(read_deployment checks "$check_runs_json")"
            if [[ "$check_result" == failure ]]; then
              echo "Cloudflare Pages preview deployment failed"
              exit 1
            fi
            if [[ "$check_result" == missing-url ]]; then
              echo "Cloudflare Pages preview URL was not found in the check run"
              exit 1
            fi
            if [[ "$check_result" == success\ * ]]; then
              preview_url="${check_result#success }"
              echo "url=${preview_url}" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            gh api "repos/${REPOSITORY}/issues/${ISSUE_NUMBER}/comments" \
              -F per_page=100 > "$comments_json"

            comment_result="$(read_deployment comments "$comments_json" "$short_sha")"
            if [[ "$comment_result" == failure ]]; then
              echo "Cloudflare Pages preview deployment failed"
              exit 1
            fi
            if [[ "$comment_result" == missing-url ]]; then
              echo "Cloudflare Pages preview URL was not found in the deployment comment"
              exit 1
            fi
            if [[ "$comment_result" == success\ * ]]; then
              preview_url="${comment_result#success }"
              echo "url=${preview_url}" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            echo "Waiting for Cloudflare Pages preview deployment..."
            sleep 15
          done

          echo "Timed out waiting for Cloudflare Pages preview deployment"
          exit 1

      - name: Run Playwright tests against preview
        env:
          PLAYWRIGHT_BASE_URL: ${{ steps.preview.outputs.url }}
        run: pnpm test:integration

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

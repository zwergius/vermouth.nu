name: Playwright Preview Tests

on:
  pull_request:
    branches: [e-commerce]

permissions:
  checks: read
  contents: read
  issues: read
  pull-requests: read

jobs:
  test-preview:
    name: Playwright on Cloudflare preview
    timeout-minutes: 30
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Wait for Cloudflare Pages preview
        id: preview
        uses: actions/github-script@v7
        with:
          script: |
            const headSha = context.payload.pull_request.head.sha
            const shortSha = headSha.slice(0, 7)
            const issue_number = context.payload.pull_request.number
            const deadline = Date.now() + 20 * 60 * 1000
            const previewUrlPattern = /<strong>Preview URL:<\/strong>[\s\S]*?<a href='([^']+)'/

            function readDeployment(body, source) {
              if (body.includes('Deploy failed')) {
                throw new Error(`Cloudflare Pages preview deployment failed in ${source}`)
              }

              if (!body.includes('Deploy successful')) {
                return false
              }

              const match = body.match(previewUrlPattern)
              if (!match) {
                throw new Error(`Cloudflare Pages preview URL was not found in ${source}`)
              }

              core.setOutput('url', match[1])
              return true
            }

            while (Date.now() < deadline) {
              const { data: checkRuns } = await github.rest.checks.listForRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: headSha,
                check_name: 'Cloudflare Pages',
                per_page: 100,
              })

              const cloudflareCheck = checkRuns.check_runs
                .filter((check) => check.app?.slug === 'cloudflare-workers-and-pages')
                .find((check) => check.name === 'Cloudflare Pages')

              if (cloudflareCheck?.conclusion === 'failure') {
                throw new Error('Cloudflare Pages preview deployment failed')
              }

              if (
                cloudflareCheck?.status === 'completed' &&
                readDeployment(cloudflareCheck.output?.summary ?? '', 'Cloudflare Pages check')
              ) {
                return
              }

              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number,
                per_page: 100,
              })

              const cloudflareComment = comments
                .filter((comment) => comment.user?.login === 'cloudflare-workers-and-pages[bot]')
                .reverse()
                .find((comment) => {
                  const body = comment.body ?? ''
                  return body.includes(`<code>${shortSha}</code>`)
                })

              if (readDeployment(cloudflareComment?.body ?? '', 'deployment comment')) {
                return
              }

              core.info('Waiting for Cloudflare Pages preview deployment...')
              await new Promise((resolve) => setTimeout(resolve, 15000))
            }

            throw new Error('Timed out waiting for Cloudflare Pages preview deployment')

      - name: Run Playwright tests against preview
        env:
          PLAYWRIGHT_BASE_URL: ${{ steps.preview.outputs.url }}
        run: pnpm test:integration

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

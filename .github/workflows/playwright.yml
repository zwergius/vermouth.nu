name: Playwright Preview Tests

on:
  pull_request:
    branches: [e-commerce]

permissions:
  contents: read
  issues: read
  pull-requests: read

jobs:
  test-preview:
    name: Playwright on Cloudflare preview
    timeout-minutes: 30
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Wait for Cloudflare Pages preview
        id: preview
        uses: actions/github-script@v7
        with:
          script: |
            const shortSha = context.payload.pull_request.head.sha.slice(0, 7)
            const issue_number = context.payload.pull_request.number
            const deadline = Date.now() + 20 * 60 * 1000

            while (Date.now() < deadline) {
              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number,
                per_page: 100,
              })

              const cloudflareComment = comments
                .filter((comment) => comment.user?.login === 'cloudflare-workers-and-pages[bot]')
                .reverse()
                .find((comment) => {
                  const body = comment.body ?? ''
                  return body.includes(`<code>${shortSha}</code>`)
                })

              const body = cloudflareComment?.body ?? ''
              if (body.includes('Deploy failed')) {
                throw new Error('Cloudflare Pages preview deployment failed')
              }

              if (body.includes('Deploy successful')) {
                const match = body.match(/<strong>Preview URL:<\/strong>[\s\S]*?<a href='([^']+)'/)
                if (!match) {
                  throw new Error('Cloudflare Pages preview URL was not found in the deployment comment')
                }
                core.setOutput('url', match[1])
                return
              }

              core.info('Waiting for Cloudflare Pages preview deployment comment...')
              await new Promise((resolve) => setTimeout(resolve, 15000))
            }

            throw new Error('Timed out waiting for Cloudflare Pages preview deployment')

      - name: Run Playwright tests against preview
        env:
          PLAYWRIGHT_BASE_URL: ${{ steps.preview.outputs.url }}
        run: pnpm test:integration

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

name: Playwright Preview Tests

on:
  pull_request:

permissions:
  checks: read
  contents: read
  issues: read
  pull-requests: read

jobs:
  test-preview:
    name: Playwright on Cloudflare preview
    timeout-minutes: 30
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        shell: bash
        run: |
          set -euo pipefail
          git init .
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git fetch --depth=1 origin "${GITHUB_REF}"
          git checkout --force FETCH_HEAD

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Wait for Cloudflare Pages preview
        id: preview
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        shell: bash
        run: |
          set -euo pipefail

          deadline=$((SECONDS + 20 * 60))
          branch_alias="$(
            printf '%s' "$HEAD_REF" |
              tr '[:upper:]' '[:lower:]' |
              sed -E 's/[^a-z0-9]+/-/g; s/^-+//' |
              cut -c1-28 |
              sed -E 's/-+$//'
          )"
          preview_url="https://${branch_alias}.vermouth-nu.pages.dev"

          while (( SECONDS < deadline )); do
            if curl --fail --silent --show-error --location --max-time 10 "$preview_url" > /dev/null; then
              echo "url=${preview_url}" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            echo "Waiting for Cloudflare Pages preview at ${preview_url}..."
            sleep 15
          done

          echo "Timed out waiting for Cloudflare Pages preview deployment"
          exit 1

      - name: Run Playwright tests against preview
        env:
          PLAYWRIGHT_BASE_URL: ${{ steps.preview.outputs.url }}
        run: pnpm test:integration

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
